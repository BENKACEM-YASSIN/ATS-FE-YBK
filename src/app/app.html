<ng-container *ngIf="!isStandaloneRoute">
<div class="h-screen w-screen flex overflow-hidden bg-surface-50 dark:bg-surface-950 transition-colors duration-300" 
     [class.print-mode]="isRenderMode"
     [class.!h-auto]="isRenderMode" 
     [class.!overflow-visible]="isRenderMode">
  
  <!-- Modern Glass Sidebar -->
  <aside *ngIf="!isRenderMode" class="w-20 h-full flex flex-col items-center py-6 glass dark:glass-dark z-50">
    <!-- Logo -->
    <button (click)="goHome()" 
      class="w-12 h-12 mb-8 rounded-2xl bg-gradient-to-br from-primary-500 to-accent-purple flex items-center justify-center shadow-glow transition-transform hover:scale-105"
      title="Home">
      <lucide-icon name="file-text" class="text-white" [size]=24></lucide-icon>
    </button>
    
    <!-- Navigation -->
    <nav class="flex-1 flex flex-col gap-2">
      <button (click)="goHome()"
        class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-200 group relative"
        [class.bg-primary-500/10]="appMode === 'welcome'"
        [class.text-primary-600]="appMode === 'welcome'"
        [class.text-surface-400]="appMode !== 'welcome'"
        [class.hover:bg-surface-100]="appMode !== 'welcome'"
        [class.dark:hover:bg-surface-800]="appMode !== 'welcome'"
        title="Dashboard">
        <lucide-icon name="layout-dashboard" [size]=22></lucide-icon>
        <div *ngIf="appMode === 'welcome'" class="absolute left-0 w-1 h-6 bg-primary-500 rounded-r-full"></div>
      </button>

      <a routerLink="/profile" 
        class="w-12 h-12 rounded-xl flex items-center justify-center text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 transition-all duration-200 group relative"
        title="Profile">
        <lucide-icon name="user" [size]=22></lucide-icon>
      </a>

      <a routerLink="/jobs" 
        class="w-12 h-12 rounded-xl flex items-center justify-center text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 transition-all duration-200 group relative"
        title="Jobs">
        <lucide-icon name="briefcase" [size]=22></lucide-icon>
      </a>

      <div class="h-px w-8 bg-surface-200 dark:bg-surface-800 my-2 mx-auto"></div>

      <button (click)="setSidebarTab('history')"
        class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-200 group relative"
        [class.bg-primary-500/10]="activeSidebarTab === 'history' && isSidebarExpanded"
        [class.text-primary-600]="activeSidebarTab === 'history' && isSidebarExpanded"
        [class.text-surface-400]="!(activeSidebarTab === 'history' && isSidebarExpanded)"
        [class.hover:bg-surface-100]="!(activeSidebarTab === 'history' && isSidebarExpanded)"
        title="History">
        <lucide-icon name="clock" [size]=22></lucide-icon>
        <div *ngIf="historyItems.length > 0" class="absolute top-2 right-2 w-2 h-2 bg-primary-500 rounded-full"></div>
      </button>

      <button (click)="handleStartScratch()"
        class="w-12 h-12 rounded-xl flex items-center justify-center text-surface-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all duration-200"
        title="New CV">
        <lucide-icon name="plus" [size]=22></lucide-icon>
      </button>
    </nav>

    <!-- Bottom Actions -->
    <div class="flex flex-col gap-2">
      <button (click)="toggleTheme()"
        class="w-12 h-12 rounded-xl flex items-center justify-center text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 transition-all duration-200"
        [title]="isDarkMode ? 'Light Mode' : 'Dark Mode'">
        <lucide-icon [name]="isDarkMode ? 'sun' : 'moon'" [size]=22></lucide-icon>
      </button>
      
      <button (click)="setSidebarTab('settings')"
        class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-200 relative"
        [class.bg-surface-100]="activeSidebarTab === 'settings' && isSidebarExpanded"
        [class.dark:bg-surface-800]="activeSidebarTab === 'settings' && isSidebarExpanded"
        [class.text-surface-700]="activeSidebarTab === 'settings' && isSidebarExpanded"
        [class.dark:text-surface-200]="activeSidebarTab === 'settings' && isSidebarExpanded"
        [class.text-surface-400]="!(activeSidebarTab === 'settings' && isSidebarExpanded)"
        [class.hover:bg-surface-100]="!(activeSidebarTab === 'settings' && isSidebarExpanded)"
        title="Settings">
        <lucide-icon name="settings" [size]=22></lucide-icon>
      </button>
    </div>
  </aside>

  <!-- Expandable Side Panel -->
  <div *ngIf="!isRenderMode" 
    [class.w-80]="isSidebarExpanded" 
    [class.w-0]="!isSidebarExpanded"
    class="h-full bg-surface-0 dark:bg-surface-900 border-r border-surface-200 dark:border-surface-800 transition-all duration-300 overflow-hidden flex flex-col z-40">
    
    <!-- History Panel -->
    <ng-container *ngIf="activeSidebarTab === 'history'">
      <div class="p-5 border-b border-surface-200 dark:border-surface-800 flex items-center justify-between">
        <h2 class="font-bold text-surface-800 dark:text-white text-lg">Recent CVs</h2>
        <button (click)="toggleSidebar()" class="p-2 text-surface-400 hover:text-surface-600 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-lg transition-colors">
          <lucide-icon name="chevron-left" [size]=20></lucide-icon>
        </button>
      </div>
      
      <div class="flex-1 overflow-y-auto p-4 space-y-6">
        <!-- Pinned Section -->
        <div *ngIf="pinnedHistory.length > 0">
          <h3 class="px-3 py-1.5 text-[11px] font-bold text-primary-600 uppercase tracking-wider mb-2 flex items-center gap-2">
            <lucide-icon name="pin" [size]=12></lucide-icon>
            Pinned
          </h3>
          <div class="space-y-1">
            <div *ngFor="let h of pinnedHistory"
              class="group flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-100 dark:hover:bg-surface-800 transition-all cursor-pointer"
              (click)="loadHistoryItem(h)">
              <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary-500/20 to-accent-purple/20 flex items-center justify-center shrink-0">
                <lucide-icon name="file-text" [size]=18 class="text-primary-600"></lucide-icon>
              </div>
              <div class="flex-1 min-w-0">
                <span class="text-sm font-medium text-surface-700 dark:text-surface-200 truncate block">{{h.title}}</span>
                <span class="text-[11px] text-surface-400">{{h.date | date:'MMM d, y'}}</span>
              </div>
              <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button (click)="$event.stopPropagation(); pinHistory(h.id, false)"
                  class="p-1.5 text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/30 rounded-lg" title="Unpin">
                  <lucide-icon name="pin-off" [size]=14></lucide-icon>
                </button>
                <button (click)="$event.stopPropagation(); deleteHistory(h.id)"
                  class="p-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg" title="Delete">
                  <lucide-icon name="trash-2" [size]=14></lucide-icon>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Section -->
        <div>
          <h3 class="px-3 py-1.5 text-[11px] font-bold text-surface-400 uppercase tracking-wider mb-2">Recent</h3>
          <div class="space-y-1">
            <div *ngFor="let h of recentHistory"
              class="group flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-100 dark:hover:bg-surface-800 transition-all cursor-pointer"
              (click)="loadHistoryItem(h)">
              <div class="w-10 h-10 rounded-lg bg-surface-100 dark:bg-surface-800 flex items-center justify-center shrink-0">
                <lucide-icon name="file-text" [size]=18 class="text-surface-400"></lucide-icon>
              </div>
              <div class="flex-1 min-w-0">
                <span class="text-sm font-medium text-surface-700 dark:text-surface-200 truncate block">{{h.title}}</span>
                <span class="text-[11px] text-surface-400">{{h.date | date:'MMM d, y'}}</span>
              </div>
              <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button (click)="$event.stopPropagation(); pinHistory(h.id, true)"
                  class="p-1.5 text-surface-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/30 rounded-lg" title="Pin">
                  <lucide-icon name="pin" [size]=14></lucide-icon>
                </button>
                <button (click)="$event.stopPropagation(); deleteHistory(h.id)"
                  class="p-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg" title="Delete">
                  <lucide-icon name="trash-2" [size]=14></lucide-icon>
                </button>
              </div>
            </div>
            <div *ngIf="recentHistory.length === 0 && pinnedHistory.length === 0" class="px-3 py-8 text-center">
              <div class="w-16 h-16 rounded-2xl bg-surface-100 dark:bg-surface-800 flex items-center justify-center mx-auto mb-3">
                <lucide-icon name="file-text" [size]=28 class="text-surface-300 dark:text-surface-700"></lucide-icon>
              </div>
              <p class="text-sm text-surface-400">No CVs yet</p>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Settings Panel -->
    <ng-container *ngIf="activeSidebarTab === 'settings'">
      <div class="p-5 border-b border-surface-200 dark:border-surface-800 flex items-center justify-between">
        <h2 class="font-bold text-surface-800 dark:text-white text-lg">Settings</h2>
        <button (click)="toggleSidebar()" class="p-2 text-surface-400 hover:text-surface-600 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-lg transition-colors">
          <lucide-icon name="chevron-left" [size]=20></lucide-icon>
        </button>
      </div>
      <div class="p-5 space-y-6">
        <div>
          <h3 class="text-xs font-bold text-surface-400 uppercase tracking-wider mb-4">Appearance</h3>
          <div class="space-y-3">
            <div class="flex items-center justify-between p-3 rounded-xl bg-surface-50 dark:bg-surface-800/50">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-surface-200 dark:bg-surface-700 flex items-center justify-center">
                  <lucide-icon name="moon" [size]=18 class="text-surface-600 dark:text-surface-300"></lucide-icon>
                </div>
                <span class="text-sm font-medium text-surface-700 dark:text-surface-200">Dark Mode</span>
              </div>
              <button (click)="toggleTheme()" 
                class="w-11 h-6 rounded-full relative transition-colors duration-200"
                [class.bg-primary-500]="isDarkMode"
                [class.bg-surface-300]="!isDarkMode">
                <div class="absolute top-1 w-4 h-4 rounded-full bg-white shadow-sm transition-all duration-200"
                  [class.left-6]="isDarkMode"
                  [class.left-1]="!isDarkMode"></div>
              </button>
            </div>
          </div>
        </div>
        
        <div>
          <h3 class="text-xs font-bold text-surface-400 uppercase tracking-wider mb-4">About</h3>
          <div class="p-4 rounded-xl bg-gradient-to-br from-primary-500/5 to-accent-purple/5 border border-primary-500/10">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-accent-purple flex items-center justify-center">
                <lucide-icon name="sparkles" class="text-white" [size]=20></lucide-icon>
              </div>
              <div>
                <p class="font-bold text-surface-800 dark:text-white">ResumeAI</p>
                <p class="text-xs text-surface-500">v1.0.0</p>
              </div>
            </div>
            <p class="text-xs text-surface-500 dark:text-surface-400 leading-relaxed">
              AI-powered resume builder for modern professionals.
            </p>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Main Content Area -->
  <main class="flex-1 h-full flex flex-col relative overflow-hidden"
        [class.!h-auto]="isRenderMode"
        [class.!overflow-visible]="isRenderMode">
    
    <!-- Top Navigation Bar -->
    <nav *ngIf="!isRenderMode" class="h-16 glass dark:glass-dark border-b border-surface-200/50 dark:border-surface-800/50 flex items-center justify-between px-6 z-30">
      <div class="flex items-center gap-4">
        <button *ngIf="!isSidebarExpanded" (click)="toggleSidebar()" 
          class="p-2.5 -ml-2 text-surface-400 hover:text-surface-700 dark:hover:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-xl transition-colors lg:hidden">
          <lucide-icon name="menu" [size]=20></lucide-icon>
        </button>
        <div class="flex items-center gap-3">
          <span class="font-bold text-xl text-surface-800 dark:text-white hidden sm:block tracking-tight">ResumeAI</span>
          <span class="px-2 py-0.5 bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400 text-[10px] font-bold uppercase tracking-wider rounded-full">Beta</span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="handleStartScratch()" 
          class="btn-primary flex items-center gap-2">
          <lucide-icon name="plus" [size]=18></lucide-icon>
          <span class="hidden sm:inline">New Resume</span>
        </button>
      </div>
    </nav>

    <!-- Content Container -->
    <div class="flex-1 relative overflow-hidden"
         [class.!overflow-visible]="isRenderMode">
      <!-- Welcome Screen Mode -->
      <div *ngIf="appMode === 'welcome'" class="h-full overflow-y-auto">
        <app-welcome-screen 
          (startScratch)="handleStartScratch($event)"
          (importData)="handleImport($event)">
        </app-welcome-screen>
      </div>

      <!-- Editor Mode -->
      <div *ngIf="appMode === 'editor'" class="h-full flex flex-col lg:flex-row"
           [class.!h-auto]="isRenderMode"
           [class.!overflow-visible]="isRenderMode">
        <!-- Editor Panel -->
        <div *ngIf="!isRenderMode" [style.width.%]="isDesktop ? editorWidth : 100"
          [class]="'h-full bg-surface-0 dark:bg-surface-900 z-20 transition-all duration-300 ease-in-out border-r border-surface-200 dark:border-surface-800 print:hidden flex-shrink-0 ' + (showPreviewMobile && !isDesktop ? 'hidden' : 'block')">
          <app-editor #editorRef 
            [cvData]="cvData" (cvDataChange)="cvData = $event" 
            [jobDescription]="jobDescription" (jobDescriptionChange)="jobDescription = $event" 
            [atsResult]="atsResult" (atsResultChange)="atsResult = $event"
            (togglePreview)="togglePreview()" [showPreviewMobile]="showPreviewMobile" 
            [isDarkMode]="isDarkMode" (toggleTheme)="toggleTheme()" 
            (backToHome)="goHome()" (refreshHistory)="loadHistory()">
          </app-editor>
        </div>

        <!-- Resize Handle (Desktop Only) -->
        <div *ngIf="isDesktop" (mousedown)="startResizing($event)"
          class="w-4 -ml-2 hover:bg-primary-500/20 cursor-col-resize hidden lg:flex items-center justify-center transition-colors z-30 relative group">
          <div class="h-8 w-1 bg-surface-300 dark:bg-surface-700 rounded-full group-hover:bg-primary-500 transition-colors"></div>
        </div>

        <!-- Preview Panel -->
        <div [class]="'flex-1 h-full overflow-y-auto overflow-x-auto bg-surface-100 dark:bg-surface-950 p-6 md:p-10 flex items-start justify-center transition-colors duration-200 print:block print:w-full print:p-0 print:overflow-visible print:bg-white relative ' + (!showPreviewMobile && !isDesktop && !isRenderMode ? 'hidden' : 'block')"
             [class.p-0]="isRenderMode" [class.bg-white]="isRenderMode">
          <button *ngIf="!isDesktop && showPreviewMobile" (click)="togglePreview()"
            class="fixed bottom-6 right-6 z-50 btn-primary shadow-glow print:hidden">
            Edit CV
          </button>

          <div *ngIf="!isRenderMode && cvData"
               class="absolute top-3 right-3 z-30 no-print flex items-center gap-1.5 rounded-xl border border-surface-200 dark:border-surface-700 bg-surface-0/90 dark:bg-surface-900/90 backdrop-blur-md px-2 py-1.5 shadow-soft">
            <button (click)="panPreview(-80)"
                    class="p-1.5 rounded-lg text-surface-600 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
                    title="Pan Left">
              <lucide-icon name="arrow-left" [size]=14></lucide-icon>
            </button>
            <button (click)="panPreview(80)"
                    class="p-1.5 rounded-lg text-surface-600 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
                    title="Pan Right">
              <lucide-icon name="arrow-right" [size]=14></lucide-icon>
            </button>
            <div class="w-px h-5 bg-surface-200 dark:bg-surface-700 mx-1"></div>
            <button (click)="zoomOutPreview()"
                    class="px-2 py-1 rounded-lg text-sm font-semibold text-surface-700 dark:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
                    title="Zoom Out">-</button>
            <input type="range"
                   [min]="minPreviewZoom * 100"
                   [max]="maxPreviewZoom * 100"
                   [step]="previewZoomStep * 100"
                   [value]="previewZoom * 100"
                   (input)="setPreviewZoomFromSlider($event)"
                   class="w-20 accent-primary-600 cursor-pointer"
                   title="Zoom" />
            <button (click)="zoomInPreview()"
                    class="px-2 py-1 rounded-lg text-sm font-semibold text-surface-700 dark:text-surface-200 hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
                    title="Zoom In">+</button>
            <span class="text-[11px] font-semibold text-surface-500 dark:text-surface-400 w-10 text-right">
              {{previewZoom * 100 | number:'1.0-0'}}%
            </span>
            <button (click)="resetPreviewView()"
                    class="p-1.5 rounded-lg text-surface-600 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800 transition-colors"
                    title="Reset View">
              <lucide-icon name="rotate-ccw" [size]=14></lucide-icon>
            </button>
          </div>

          <div class="w-full min-h-full flex items-start justify-center select-none"
               [class.cursor-grabbing]="isPanningPreview"
               [class.cursor-grab]="!isPanningPreview"
               (mousedown)="startPreviewPan($event)">
            <div class="preview-transform"
                 [class.preview-transform--panning]="isPanningPreview"
                 [style.transform]="'translate(' + previewPanX + 'px, ' + previewPanY + 'px) scale(' + previewZoom + ')'">
              <app-cv-preview *ngIf="cvData" [data]="cvData"></app-cv-preview>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</ng-container>

<router-outlet *ngIf="isStandaloneRoute"></router-outlet>
