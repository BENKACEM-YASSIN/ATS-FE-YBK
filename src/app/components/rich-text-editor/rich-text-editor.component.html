<div
    [class]="'border rounded-md overflow-hidden bg-white dark:bg-slate-950 transition-colors ' + (isFocused ? 'ring-2 ring-euro-blue border-transparent' : 'border-slate-300 dark:border-slate-700') + ' ' + className">
    <!-- Toolbar -->
    <div
        class="flex items-center gap-1 p-1 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700">
        <button type="button" (click)="$event.preventDefault(); execCommand('bold')"
            class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"
            title="Bold">
            <lucide-icon name="bold" [size]="16"></lucide-icon>
        </button>
        <button type="button" (click)="$event.preventDefault(); execCommand('italic')"
            class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"
            title="Italic">
            <lucide-icon name="italic" [size]="16"></lucide-icon>
        </button>
        <button type="button" (click)="$event.preventDefault(); execCommand('underline')"
            class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"
            title="Underline">
            <lucide-icon name="underline" [size]="16"></lucide-icon>
        </button>
        <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
        <button type="button" (click)="$event.preventDefault(); execCommand('insertUnorderedList')"
            class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"
            title="Bullet List">
            <lucide-icon name="list" [size]="16"></lucide-icon>
        </button>
        <button type="button" (click)="$event.preventDefault(); execCommand('insertOrderedList')"
            class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300"
            title="Ordered List">
            <lucide-icon name="list-ordered" [size]="16"></lucide-icon>
        </button>
        <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
        <button type="button" (click)="$event.preventDefault(); execCommand('removeFormat')"
            class="p-1.5 rounded hover:bg-red-50 dark:hover:bg-red-900/30 text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 transition-colors"
            title="Remove Formatting">
            <lucide-icon name="remove-formatting" [size]="16"></lucide-icon>
        </button>
    </div>

    <!-- Editor Area -->
    <div #editor contenteditable="true" (input)="onInput()" (focus)="onFocus()" (blur)="onBlur()"
        class="p-3 min-h-[120px] outline-none text-sm text-slate-900 dark:text-slate-100 rich-text"
        style="white-space: pre-wrap; overflow-wrap: break-word;"></div>

    <!-- Placeholder Helper -->
    <div *ngIf="!value && !isFocused" class="absolute pointer-events-none p-3 text-sm text-slate-400 mt-[-120px] pl-3">
        {{placeholder}}
    </div>
</div>
