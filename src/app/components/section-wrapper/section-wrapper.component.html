<section
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg shadow-sm overflow-hidden transition-colors">
    <div class="bg-slate-50 dark:bg-slate-800/80 px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center group cursor-pointer select-none"
        (click)="toggleExpand()">
        <div class="flex items-center gap-3 flex-1">
            <div class="text-slate-400 hover:text-euro-blue transition-colors">
                <lucide-icon [name]="isExpanded ? 'chevron-up' : 'chevron-down'" [size]="16"></lucide-icon>
            </div>

            <div class="cursor-move text-slate-300 hover:text-slate-500 dark:text-slate-600 dark:hover:text-slate-400"
                (click)="$event.stopPropagation()">
                <lucide-icon name="grip-vertical" [size]="16"></lucide-icon>
            </div>

            <ng-container *ngIf="enableCustomTitle; else staticTitle">
                <input type="text" [ngModel]="title" (ngModelChange)="onTitleChange($event)"
                    (click)="$event.stopPropagation()"
                    class="bg-transparent font-semibold text-slate-800 dark:text-slate-100 focus:outline-none focus:border-b focus:border-euro-blue w-full max-w-[200px]"
                    placeholder="Section Title" />
            </ng-container>
            <ng-template #staticTitle>
                <h2 class="font-semibold text-slate-800 dark:text-slate-100">{{title}}</h2>
            </ng-template>

            <!-- Column Toggle -->
            <div class="flex items-center gap-2 ml-4 px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400"
                (click)="$event.stopPropagation()">
                <input type="checkbox" [checked]="column === 'left'" (change)="onColumnToggle($event)"
                    id="col-toggle-{{title}}"
                    class="w-3 h-3 rounded border-slate-300 text-euro-blue focus:ring-euro-blue" />
                <label for="col-toggle-{{title}}" class="cursor-pointer">Left Column</label>
            </div>
        </div>

        <div class="flex items-center gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity"
            (click)="$event.stopPropagation()">
            <button (click)="moveUp.emit()" [disabled]="isFirst"
                class="p-1.5 text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 rounded disabled:opacity-30"
                title="Move Up">
                <lucide-icon name="arrow-up" [size]="14"></lucide-icon>
            </button>
            <button (click)="moveDown.emit()" [disabled]="isLast"
                class="p-1.5 text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700 rounded disabled:opacity-30"
                title="Move Down">
                <lucide-icon name="arrow-down" [size]="14"></lucide-icon>
            </button>
            <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
            <button (click)="remove.emit()"
                class="p-1.5 text-slate-500 hover:text-red-600 hover:bg-red-50 dark:text-slate-400 dark:hover:bg-red-900/30 rounded transition-colors"
                title="Remove Section">
                <lucide-icon name="trash-2" [size]="14"></lucide-icon>
            </button>
        </div>
    </div>

    <div *ngIf="isExpanded" class="p-4 animate-in slide-in-from-top-2 duration-200">
        <ng-content></ng-content>
    </div>
</section>
